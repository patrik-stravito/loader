<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Loader Animations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont,
        'Segoe UI', Roboto, sans-serif;
      padding: 48px 24px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      border: 1px solid #2a2a2a;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #444;
    }

    .card .preview {
      width: 120px;
      height: 120px;
    }

    .card .label {
      font-size: 13px;
      color: #999;
      text-align: center;
    }

    .bg-light {
      background: #f5f5f5;
      border-color: #ddd;
    }

    .bg-light:hover {
      border-color: #bbb;
    }

    .bg-light .label {
      color: #666;
    }
  </style>
</head>
<body>
