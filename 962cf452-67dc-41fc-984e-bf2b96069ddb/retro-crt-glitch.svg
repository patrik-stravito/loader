<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" style="background:#0a0a1a; overflow:hidden;">
    <defs>
        <!-- Original Gradient -->
        <linearGradient id="originalGrad" gradientUnits="userSpaceOnUse" x1="17.0234" y1="616.2436" x2="147.1582" y2="771.3345" gradientTransform="matrix(1 0 0 1 0 -598)">
            <stop offset="0" style="stop-color:#FF4B64"/>
            <stop offset="0.5" style="stop-color:#FF3981"/>
            <stop offset="1" style="stop-color:#BD1BBA"/>
        </linearGradient>

        <!-- CRT Scanline Pattern (scaled up for small render) -->
        <pattern id="scanlines" width="16" height="16" patternUnits="userSpaceOnUse">
            <rect width="16" height="8" fill="#000" fill-opacity="0.35" />
        </pattern>

        <!-- Retro 90s Wireframe Grid (scaled up for small render) -->
        <pattern id="retro-grid" width="80" height="80" patternUnits="userSpaceOnUse">
            <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#BD1BBA" stroke-width="1.5" opacity="0.3" />
        </pattern>
    </defs>

    <style>
        <![CDATA[
        /* Moving Background Grid */
        .grid-bg {
            fill: url(#retro-grid);
            animation: scrollGrid 1.5s linear infinite;
        }

        /* Continuous Color Shifting and Slight Flicker */
        .main-shape {
            fill: url(#originalGrad);
            animation: neon-party 5s infinite linear, crt-flicker 0.12s infinite;
        }

        /* Left Channel Glitch */
        .glitch-cyan {
            fill: #00ffff;
            mix-blend-mode: screen;
            animation: glitch-anim-1 2s infinite step-end alternate-reverse;
            opacity: 0.8;
        }

        /* Right Channel Glitch */
        .glitch-magenta {
            fill: #ff00ff;
            mix-blend-mode: screen;
            animation: glitch-anim-2 3s infinite step-start alternate-reverse;
            opacity: 0.8;
        }

        /* Glowing Draw Effect */
        .wireframe {
            fill: none;
            stroke: #00ffff;
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawWireframe 5s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 6px #00ffff);
        }

        /* Slowly scaling the whole logo group */
        .logo-group {
            transform-origin: center;
            animation: logo-bounce 4s infinite ease-in-out alternate;
        }

        @keyframes scrollGrid {
            0% { transform: translate(0, -80px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes drawWireframe {
            0% { stroke-dashoffset: 1000; opacity: 1; }
            45% { stroke-dashoffset: 0; opacity: 1; }
            55% { opacity: 0; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        @keyframes logo-bounce {
            0% { transform: translate(38px, 24px) scale(0.95); }
            100% { transform: translate(38px, 24px) scale(1.05); }
        }

        @keyframes neon-party {
            0% { filter: drop-shadow(0 0 10px #FF3981); }
            50% { filter: drop-shadow(0 0 25px #FF3981); }
            100% { filter: drop-shadow(0 0 10px #FF3981); }
        }

        @keyframes crt-flicker {
            0% { opacity: 0.90; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }

        /* Chunky Tracking Errors */
        @keyframes glitch-anim-1 {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-6px, 4px) skewX(15deg); }
            15% { transform: translate(0, 0) skewX(0); }
            30% { transform: translate(5px, -3px); }
            35% { transform: translate(0, 0); }
            60% { transform: translate(-4px, 6px); }
            65% { transform: translate(0, 0); }
            100% { transform: translate(0, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { transform: translate(0, 0); }
            15% { transform: translate(7px, -5px) skewX(-15deg); }
            20% { transform: translate(0, 0) skewX(0); }
            45% { transform: translate(-6px, 3px); }
            50% { transform: translate(0, 0); }
            75% { transform: translate(4px, -6px); }
            80% { transform: translate(0, 0); }
            100% { transform: translate(0, 0); }
        }

        .scanline-overlay {
            pointer-events: none;
            fill: url(#scanlines);
        }
        ]]>
    </style>

    <!-- Scrolling Grid Background -->
    <rect width="320" height="320" class="grid-bg" x="-40" y="-40" />

    <!-- Centered Logo Graphic -->
    <g class="logo-group">
        <!-- Offset Glitch Layers -->
        <path class="glitch-cyan" d="M164.1,0v41H54.7L6.8,123.1H0v-64c0-5.5,1.5-10.8,4.2-15.5l12.8-22C24.8,8.2,39.2,0,54.7,0C54.7,0,164.1,0,164.1,0z M109.5,191.6c15.5,0,29.8-8.2,37.7-21.6l12.8-22c2.8-4.7,4.2-10.1,4.2-15.5v-64h-6.8l-47.9,82.1H0.1v41H109.5z" />

        <path class="glitch-magenta" d="M164.1,0v41H54.7L6.8,123.1H0v-64c0-5.5,1.5-10.8,4.2-15.5l12.8-22C24.8,8.2,39.2,0,54.7,0C54.7,0,164.1,0,164.1,0z M109.5,191.6c15.5,0,29.8-8.2,37.7-21.6l12.8-22c2.8-4.7,4.2-10.1,4.2-15.5v-64h-6.8l-47.9,82.1H0.1v41H109.5z" />

        <!-- Main Graphic Shape -->
        <path class="main-shape" d="M164.1,0v41H54.7L6.8,123.1H0v-64c0-5.5,1.5-10.8,4.2-15.5l12.8-22C24.8,8.2,39.2,0,54.7,0C54.7,0,164.1,0,164.1,0z M109.5,191.6c15.5,0,29.8-8.2,37.7-21.6l12.8-22c2.8-4.7,4.2-10.1,4.2-15.5v-64h-6.8l-47.9,82.1H0.1v41H109.5z" />

        <!-- Cyber-Trace Wireframe -->
        <path class="wireframe" d="M164.1,0v41H54.7L6.8,123.1H0v-64c0-5.5,1.5-10.8,4.2-15.5l12.8-22C24.8,8.2,39.2,0,54.7,0C54.7,0,164.1,0,164.1,0z M109.5,191.6c15.5,0,29.8-8.2,37.7-21.6l12.8-22c2.8-4.7,4.2-10.1,4.2-15.5v-64h-6.8l-47.9,82.1H0.1v41H109.5z" />
    </g>

    <!-- Foreground Scanlines overlay -->
    <rect width="100%" height="100%" class="scanline-overlay" />
</svg>
